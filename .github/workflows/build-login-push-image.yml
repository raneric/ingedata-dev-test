name: build-login-push-image
run-name: Login to a container registry, build and push image
on:
  workflow_call:
    inputs:
      image-repo:
        required: true
        type: string
      docker-context:
        required: true
        type: string
      docker-file:
        required: true
        type: string
      build-args:
        required: false
        type: string

    secrets:
      token:
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  containerize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Debug server folder
        run: |
          echo "Listing server folder:"
          ls -R ${{ inputs.docker-context }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: get commit short sha
        id: short-sha-step
        uses: ./.github/actions/get-short-sha-action/
        with:
          full-sha: ${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.docker-file }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/${{ inputs.image-repo }}:${{ steps.short-sha-step.outputs.short-sha }}
          build-args: ${{ inputs.build-args }}
