name: manual-workfolw
run-name: Manual workflow for test purpose
on:
  workflow_dispatch:

jobs:
  test-short-sha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: test custom action
        id: custom-sha
        uses: ./.github/actions/get-short-sha-action/
        with:
          full-sha: ${{ github.sha }}
      - name: test data
        run: echo $SHORT_SHA
        env:
          SHORT_SHA: ${{ steps.custom-sha.outputs.short-sha }}

  test-sub-server:
    uses: ./.github/workflows/containerization.yml
    with:
      image-repo: 'react-front'
      docker-context: './client'
      docker-file: './client/Dockerfile'

  test-sub-client:
    uses: ./.github/workflows/containerization.yml
    with:
      image-repo: 'booking-ap'
      docker-context: './server'
      docker-file: './server/Dockerfile'
