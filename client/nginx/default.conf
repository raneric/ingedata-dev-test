server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for better performance
    gzip on;
    gzip_types text/plain application/javascript application/json text/css text/html;
    gzip_min_length 256;

    # Cache static assets aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Route all other requests to index.html (SPA support)
    location / {
        try_files $uri /index.html;
    }
}