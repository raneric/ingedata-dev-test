services:
  server:
    build: ./server
    networks:
      - local-shared-network
    ports:
      - '3000:3000'
    env_file:
      - path: ./server/db.env
        required: true
    volumes:
      - ./server:/app
    restart: always

  client:
    build: ./client
    networks:
      - local-shared-network
    ports:
      - '5173:80'
    volumes:
      - ./client:/app
    restart: always
    depends_on:
      - server

networks:
  local-shared-network:
    external: true
