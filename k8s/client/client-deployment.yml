apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deployment
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: front-end
          image: ghcr.io/raneric/react-front:d3c1add
          ports:
            - containerPort: 80
          env:
            - name: API_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: client-cm
                  key: API_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
