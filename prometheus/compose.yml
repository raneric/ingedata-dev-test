services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    ports:
      - "9090:9090"
    networks:
      - local-shared-network

networks:
  local-shared-network:
    external: true
